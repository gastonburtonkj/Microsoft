<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>account.microsoft.com</title>
<style>
body {
font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
text-align: center;
background-color: #f5f5f5;
margin: 0;
padding: 0;
}

/* Top banner with logos */
.top-banner {
background-color: #2b2b2b;
padding: 15px 0;
display: flex;
justify-content: center;
align-items: center;
gap: 20px;
}

.service-logos img {
width: 32px;
height: 32px;
}

/* Microsoft logo */
.logo {
font-size: 2em;
font-weight: bold;
margin: 20px 0 10px 0;
}

/* Login Box */
.login-box {
display: inline-block;
text-align: center;
background-color: white;
padding: 20px 30px;
border: 1px solid #ccc;
max-width: 340px; /* compact width */
}

.login-box h2 {
margin: 0;
font-size: 20px;
}

.login-box p {
margin: 3px 0; /* compress lines */
font-size: 14px;
}

/* Inputs with placeholders only */
.login-box input[type="text"],
.login-box input[type="password"] {
width: 100%;
padding: 8px;
margin: 5px 0;
box-sizing: border-box;
}

::placeholder {
color: #666;
}

/* Checkbox left-aligned */
.checkbox-container {
display: flex;
align-items: center;
justify-content: flex-start;
margin: 5px 0;
}

.checkbox-container input {
margin-right: 5px;
}

/* Slim blue Sign in button */
.login-box button {
margin-top: 8px;
padding: 6px 0; /* slimmer */
width: 100%;
background-color: #0078D7;
color: white;
border: none;
font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
font-size: 13px; /* smaller font for slim style */
cursor: pointer;
}

.login-box button:hover {
background-color: #005A9E;
}

/* Footer links compact */
.footer-links {
margin-top: 8px;
text-align: left;
}

.footer-links span {
color: black;
}

.footer-links a {
color: #0067B8;
text-decoration: none;
margin-left: 3px;
}

.footer-links p {
margin: 4px 0; /* minimal spacing */
}

/* "What's this?" plain */
.login-box a {
text-decoration: none;
color: #0067B8;
}

</style>
</head>
<body>

<!-- Top logos -->
<div class="top-banner">
<div class="service-logos">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Skype_icon_logo_2020.svg" alt="Skype">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/43/Xbox_one_logo.svg" alt="Xbox">
<img src="https://upload.wikimedia.org/wikipedia/commons/f/f/Bing_10go_2020.svg" alt="Bing">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Microsoft_outlook_Logo.png" alt="Outlook">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/MSN_2012_logo.svg" alt="MSN">
<img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/windows_Live_logo.svg" alt="Windows Live">
<img src="https://upload.wikimedia.org/wikipedia/commons/1/14/OneDrive_Logo.svg" alt="OneDrive">
</div>
</div>
<head>
<style>
.top-banner {
padding: 20px 0;
text-align: center;
}

.service-logos {
display: flex;
justify-content: center;
align-items: center;
gap: 20px;
flex-wrap: wrap;
}

.service-logos img {
height: 50px;
width: auto;
object-fit: contain;
transition: transform 0.2s, filter 0.2s;
filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5)); /* makes logos visible on white */
}

.service-logos img:hover {
transform: scale(1.1);
filter: drop-shadow(4px 4px 8px rgba(0,0,0,0.7));
}
  
<!-- Microsoft Logo -->
<div class="logo">Microsoft</div>

<!-- Login Box -->
<div class="login-box">
<h2>Sign in</h2>
<p>Use your Microsoft account. <a href="#">What's this?</a></p>

<form id="loginForm">
<input type="text" id="email" name="email" placeholder="Email or phone" required>
<input type="password" id="password" name="password" placeholder="Password" required>

<div class="checkbox-container">
<input type="checkbox" id="keepSignedIn" name="keepSignedIn">
<label for="keepSignedIn">Keep me signed in</label>
</div>

<button type="submit">Sign in</button>
</form>

<!-- Footer links compact -->
<div class="footer-links">
<p><span>No account?</span><a href="#">Create one!</a></p>
<p><a href="#">Forgot my password</a></p>
<p><a href="#">Sign in with a single-use code</a></p>
</div>
</div>

<p style="margin-top: 30px;"> Microsoft</p>

<script>
document.getElementById("loginForm").addEventListener("submit", function(event){
event.preventDefault();

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();

if(email === "" || password === ""){
alert("Please enter both email/phone and password.");
} else {
alert("Login successful for: " + email);
}
});
</script>

</body>
</html>
